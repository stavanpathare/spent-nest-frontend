<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spent Nest | Graphs</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Assets/CSS/dashboard.css" />
    <link rel="stylesheet" href="Assets/CSS/footer.css" />
    <link rel="stylesheet" href="Assets/CSS/app.css" />
    <link rel="icon" type="image/png" href="Assets/Icon/graph.png" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="app-page">
    <header class="navbar home-navbar">
      <a class="brand" href="home.html" aria-label="SpentNest home"><img src="Assets/ICON/logo.png" alt="SpentNest logo" /><span>SpentNest</span></a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="home.html">Home</a>
        <a href="dashboard.html" >Dashboard</a>
        <a href="dues.html">Dues</a>
        <a href="graph.html" class="active">Graph</a>
        <a href="ai.html">AI</a>
      </nav>
    </header>
    <h1>📊 Financial Insights</h1>

    <div class="container">
      <div class="card">
        <h2>Savings vs Budget (Monthly)</h2>
        <div
          class="chart-container"
          style="height: 400px; width: 100%; overflow-x: auto"
        >
          <canvas id="savingsVsBudgetChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>Budget by Category</h2>
        <div style="width: 300px; height: 300px; margin: auto">
          <canvas id="budgetPieChart"></canvas>
        </div>
      </div>
      <div class="card">
        <h2>Expenses by Category</h2>
        <div style="width: 300px; height: 300px; margin: auto">
        <canvas id="expensesByCategoryChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>Expenses Over Time</h2>
        <div class="chart-container" style="max-width: 600px; margin-top: 40px">
          <canvas id="monthlyExpenseChart"></canvas>
        </div>
       
      </div>

       <button class="logout-btn" onclick="logout()">🚪 Logout</button>

        
     
    </div>


    <script src="script.js"></script>
    <script src="graph.js"></script>

    <!-- Footer -->
    <footer>
           <p>&copy; 2025 Created by <a href="http://stavanlabs.is-a.dev" class="stavan-labs" target="_blank">Stavan Labs</a> . All rights reserved.</p>
    </footer>
  </body>
</html>
